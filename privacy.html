<!doctype html>
<html lang="zh-HK">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>隱私政策 (Privacy Policy) - AceSpeller 默書100分</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Nunito:wght@400;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/style.css" />
    <style>
        .legal-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 24px;
            background: white;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-sm);
        }

        .legal-content h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: var(--primary-dark);
        }

        .legal-content h2 {
            font-size: 1.5rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
            color: var(--text-main);
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 8px;
        }

        .legal-content p {
            margin-bottom: 1rem;
            line-height: 1.8;
            color: #4a5568;
        }

        .legal-content ul {
            padding-left: 24px;
            margin-bottom: 1.5rem;
        }

        .legal-content li {
            margin-bottom: 0.5rem;
            line-height: 1.6;
            color: #4a5568;
        }

        .legal-content strong {
            color: var(--text-main);
        }

        .lang-divider {
            margin: 48px 0;
            border: none;
            border-top: 2px solid var(--bg-color);
        }
    </style>
</head>

<body>
    <nav class="shared-nav">
        <a href="/" class="shared-nav-brand">
            <img src="/logo.png" alt="AceSpeller Logo" />
            AceSpeller
        </a>
        <a href="/" class="shared-nav-back">
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            返回首頁
        </a>
    </nav>

    <main class="container" style="padding-bottom: 80px;">
        <div class="legal-content">
            <div id="content-container" style="min-height: 400px; display: flex; align-items: center; justify-content: center; color: var(--text-main);">
                正在從伺服器載入最新條款 (Loading latest policy)...
            </div>
            
            <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
            <script>
                async function loadPolicy() {
                    try {
                        const response = await fetch('/privacy_policy.md');
                        if (!response.ok) throw new Error('Failed to fetch policy');
                        const text = await response.text();
                        
                        // Configure marked to use standard styling
                        marked.setOptions({
                            breaks: true,
                            gfm: true
                        });
                        
                        document.getElementById('content-container').innerHTML = marked.parse(text);
                        document.getElementById('content-container').style.display = 'block';
                    } catch (error) {
                        document.getElementById('content-container').innerHTML = '<p>載入失敗，請稍後再試。 (Failed to load policy, please try again later.)</p>';
                        console.error('Error loading policy:', error);
                    }
                }
                loadPolicy();
            </script>
        </div>
    </main>
    <footer class="shared-footer">
        <p>© 2026 MuduoPro Limited · <a href="/">AceSpeller 默書100分</a> · <a href="/terms">服務條款</a> · <a href="mailto:cs@acespeller.com.hk">聯絡我們</a></p>
    </footer>
</body>

</html>
