<!doctype html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的帳號 - AceSpeller 默書100分</title>
  <meta name="description" content="查看您的 AceSpeller 訂閱狀態、AceCoins 餘額及帳號資料。" />
  <meta name="robots" content="noindex" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="stylesheet" href="/style.css" />

  <style>
    .profile-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 24px 48px;
    }

    .profile-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      max-width: 480px;
      width: 100%;
      box-shadow: var(--shadow-card);
      backdrop-filter: blur(16px);
    }

    /* ── Sign-in section ── */
    .signin-section {
      text-align: center;
    }
    .signin-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }
    .signin-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--text-white);
      margin-bottom: 8px;
    }
    .signin-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 28px;
      line-height: 1.6;
    }

    /* ── Auth buttons ── */
    .auth-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px 20px;
      border-radius: var(--radius-pill);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      margin-bottom: 12px;
      transition: opacity 0.15s;
    }
    .auth-btn:hover { opacity: 0.85; }
    .auth-btn-google {
      background: #fff;
      color: #1a1a1a;
    }
    .auth-btn-apple {
      background: #1a1a1a;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
    }

    /* ── Profile section ── */
    .profile-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }
    .profile-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--glass-border);
    }
    .profile-name {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--text-white);
    }
    .profile-email {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .info-grid {
      display: grid;
      gap: 12px;
      margin-bottom: 24px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: rgba(255,255,255,0.04);
      border-radius: var(--radius-sm);
      border: 1px solid var(--glass-border);
    }
    .info-label {
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    .info-value {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-white);
    }
    .info-value.tier-plus { color: #a78bfa; }
    .info-value.tier-pro  { color: var(--gold); }

    .action-btns {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .action-btn {
      flex: 1;
      padding: 11px 16px;
      border-radius: var(--radius-pill);
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      text-align: center;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .action-btn:hover { opacity: 0.85; }
    .action-btn-primary {
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      color: #1a1a1a;
    }
    .action-btn-secondary {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--text-white);
    }

    .signout-btn {
      width: 100%;
      padding: 11px;
      border-radius: var(--radius-pill);
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--text-muted);
      font-size: 0.88rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .signout-btn:hover {
      border-color: var(--coral);
      color: var(--coral);
    }

    /* ── Loading / Error ── */
    .loading-spinner {
      text-align: center;
      padding: 60px 0;
      color: var(--text-muted);
    }
    .profile-error {
      display: none;
      color: var(--coral);
      font-size: 0.85rem;
      margin-bottom: 12px;
      text-align: center;
    }

    /* ── Nav ── */
    .profile-nav {
      width: 100%;
      max-width: 480px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .profile-nav-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text-white);
      font-weight: 800;
    }
    .profile-nav-brand img {
      width: 32px;
      height: 32px;
      border-radius: 8px;
    }
    .profile-nav-back {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .profile-nav-back:hover { color: var(--text-white); }

    /* ── Lang switcher ── */
    .lang-row {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-top: 24px;
    }
    .lang-btn {
      background: none;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-pill);
      padding: 4px 12px;
      font-size: 0.75rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .lang-btn.active, .lang-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }
  </style>
</head>
<body>
  <main class="profile-page">

    <!-- Nav -->
    <nav class="profile-nav">
      <a class="profile-nav-brand" href="/">
        <img src="/logo.png" alt="AceSpeller" />
        AceSpeller
      </a>
      <a class="profile-nav-back" href="/">← 返回首頁</a>
    </nav>

    <div class="profile-card">

      <!-- Loading -->
      <div id="profile-loading" class="loading-spinner">⏳ &nbsp;載入中...</div>

      <!-- Sign-in section -->
      <div id="profile-signin" class="signin-section" style="display:none">
        <div class="signin-icon">👤</div>
        <h1 id="signin-title" class="signin-title">登入以查看帳號</h1>
        <p id="signin-desc" class="signin-desc">使用與 AceSpeller App 相同的帳號登入，即可查看訂閱狀態與 AceCoins 餘額。</p>

        <button id="btn-google" class="auth-btn auth-btn-google">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          <span id="btn-google-text">以 Google 帳號登入</span>
        </button>

        <button id="btn-apple" class="auth-btn auth-btn-apple">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white" aria-hidden="true">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
          </svg>
          <span id="btn-apple-text">以 Apple ID 登入</span>
        </button>
      </div>

      <!-- Profile section -->
      <div id="profile-main" style="display:none">
        <div class="profile-header">
          <img id="profile-avatar" class="profile-avatar" src="/logo.png" alt="" />
          <div>
            <div id="profile-name" class="profile-name">—</div>
            <div id="profile-email" class="profile-email">—</div>
          </div>
        </div>

        <p id="profile-error" class="profile-error"></p>

        <div class="info-grid">
          <div class="info-row">
            <span id="lbl-tier" class="info-label">訂閱方案</span>
            <span id="profile-tier" class="info-value">—</span>
          </div>
          <div class="info-row">
            <span id="lbl-expiry" class="info-label">到期日</span>
            <span id="profile-expiry" class="info-value">—</span>
          </div>
          <div class="info-row">
            <span id="lbl-coins" class="info-label">AceCoins</span>
            <span id="profile-coins" class="info-value">—</span>
          </div>
        </div>

        <div class="action-btns">
          <a id="btn-upgrade" href="/upgrade" class="action-btn action-btn-primary">升級方案</a>
          <a id="btn-redeem" href="/redeem" class="action-btn action-btn-secondary">兌換碼</a>
        </div>

        <button id="btn-signout" class="signout-btn">登出</button>
      </div>

    </div>

    <!-- Lang switcher -->
    <div class="lang-row">
      <button class="lang-btn active" data-lang="zh-HK">繁體</button>
      <button class="lang-btn" data-lang="zh-CN">简体</button>
      <button class="lang-btn" data-lang="en-US">EN</button>
    </div>

    <p id="page-heading" style="display:none">我的帳號</p>

  </main>

  <script type="module" src="/profile.js"></script>
</body>
</html>
